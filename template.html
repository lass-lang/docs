<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lass Documentation</title>
  <meta name="description" content="Documentation for the Lass CSS preprocessor — syntax reference, axioms, and getting started guide.">
  <link rel="stylesheet" href="{{css}}">
</head>
<body>
  <nav class="site-nav">
    <a href="https://lass-lang.dev/">Lass</a>
    <a href="{{root}}">Docs</a>
    <a href="{{root}}getting-started/">Get Started</a>
    <a href="{{root}}syntax/">Syntax</a>
    <a href="{{root}}axioms/style-lookup/">Axioms</a>
    <a href="{{root}}llms.txt">llms.txt</a>
  </nav>
  <main class="page">
    {{content}}
  </main>
  <script>
  // Copy button for code blocks
  (function() {
    document.querySelectorAll('pre.shiki').forEach(function(pre) {
      var code = pre.querySelector('code');
      if (!code) return;
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.onclick = function() {
        navigator.clipboard.writeText(code.textContent.trim());
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
      };
      pre.style.position = 'relative';
      btn.style.position = 'absolute';
      btn.style.top = '0.5rem';
      btn.style.right = '0.5rem';
      pre.appendChild(btn);
    });
  })();
  </script>
</body>
</html>
