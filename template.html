<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lass Documentation</title>
  <meta name="description" content="Documentation for the Lass CSS preprocessor — syntax reference, axioms, and getting started guide.">
  <link rel="stylesheet" href="https://assets.lass-lang.dev/css/index.css">
  <link rel="stylesheet" href="{{css}}">
</head>
<body>
  <nav class="site-nav">
    <a href="https://lass-lang.dev/">Lass</a>
    <a href="{{root}}">Docs</a>
    <a href="{{root}}getting-started/">Get Started</a>
    <a href="{{root}}syntax/">Syntax</a>
    <a href="{{root}}axioms/style-lookup/">Axioms</a>
    <a href="{{root}}llms.txt">llms.txt</a>
  </nav>
  <main class="page">
    {{content}}
  </main>
  <script>
  // Language label for code blocks
  (function() {
    var langNames = { lass: 'Lass', css: 'CSS', html: 'HTML', js: 'JavaScript', javascript: 'JavaScript', ts: 'TypeScript', typescript: 'TypeScript', bash: 'Bash', json: 'JSON', scss: 'SCSS', toml: 'TOML', yaml: 'YAML', markdown: 'Markdown' };
    document.querySelectorAll('pre.shiki').forEach(function(pre) {
      var code = pre.querySelector('code');
      if (!code) return;
      var match = code.className.match(/language-(\w+)/);
      if (!match) return;
      var label = document.createElement('span');
      label.className = 'code-lang';
      label.textContent = langNames[match[1]] || match[1];
      pre.style.position = 'relative';
      pre.appendChild(label);
    });
  })();
  </script>
</body>
</html>
